{% extends 'base.html' %}
{% block title %}Нууц үг шинэчлэх{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="d-flex align-items-center mb-3">
            <a href="{% url 'user_list' %}" class="btn btn-outline-secondary btn-sm me-2"><i class="bi bi-arrow-left"></i></a>
            <h4 class="fw-bold mb-0">Нууц үг шинэчлэх</h4>
        </div>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <div class="alert alert-info mb-3">
                    <strong>{{ edit_user.username }}</strong> — {{ edit_user.get_full_name }}
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Шинэ нууц үг <span class="text-danger">*</span></label>
                        <input type="password" name="new_password" class="form-control" required minlength="6">
                        <div class="form-text">Хамгийн багадаа 6 тэмдэгт</div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-key me-1"></i>Шинэчлэх
                        </button>
                        <a href="{% url 'user_list' %}" class="btn btn-outline-secondary">Болих</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
