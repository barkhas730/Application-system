<!DOCTYPE html>
<html lang="mn" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нэвтрэх — Өргөдлийн систем</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #4338ca 50%, #6366f1 100%);
            min-height: 100vh;
        }
        .login-card {
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: none;
        }
        .login-icon-wrap {
            width: 68px; height: 68px;
            border-radius: 18px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 8px 20px rgba(99,102,241,0.4);
        }
        .form-control, .input-group-text {
            border-radius: 8px !important;
            font-size: 14px;
        }
        .input-group .form-control { border-radius: 0 8px 8px 0 !important; }
        .input-group .input-group-text { border-radius: 8px 0 0 8px !important; background: #f8f9fa; }
        .btn-login {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            padding: 11px;
            font-size: 15px;
            transition: all 0.2s;
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="container" style="max-width:420px">
    <div class="card login-card border-0">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                {% load static %}
                <div class="login-icon-wrap">
                    <!-- Байгууллагын лого SVG дүрс -->
                    <img src="{% static 'img/logo.svg' %}" alt="Лого" style="width:42px;height:42px;object-fit:contain">
                </div>
                <p class="fw-bold mb-0" style="font-size:17px;line-height:1.5;color:#1e293b">
                    Байгууллагын дотоод өргөдлийн<br>удирдлагын систем
                </p>
            </div>
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} py-2">{{ message }}</div>
                {% endfor %}
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Хэрэглэгчийн нэр</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Хэрэглэгчийн нэр" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Нууц үг</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-login btn-primary w-100 text-white">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Нэвтрэх
                </button>
            </form>
        </div>
    </div>
    <p class="text-center text-white mt-3 small opacity-75">
        © 2026 Цахим өргөдлийн систем — Дипломын ажил
    </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
